interface:
  display_name: "Codebase to Course"
  short_description: "Turn a repository into a multi-file offline course for non-technical learners"
  default_prompt: >
    Use $codebase-to-course when the user wants a codebase taught as a browser-openable course rather than a plain explanation. Resolve the source from the current workspace when no explicit path is given, or use a user-provided local checkout or local directory path. Do not treat remote repo URLs or hosted repo references as valid `--source` values; if the user gives a remote repo reference, clone it first or ask for a local path before running `bash .codex/skills/codebase-to-course/scripts/init-course.sh --source <repo-or-dir> --out <course-dir> [--title <title>] [--accent <vermillion|coral|teal|amber|forest>]`. If the caller does not supply an output directory, derive one at <workspace>/.codex-artifacts/codebase-to-course/<slug>/ and pass it to `init-course.sh`. Treat simple codebases as sequential module-writing work. Treat complex codebases as brief-first work: write module briefs into `briefs/` before drafting modules, and only parallelize module writing when the host can support that cleanly. Author lesson modules as `modules/*.html`, with exactly one root `<section id="...">` per file. Navigation labels come from `data-title` on that root section or else from the first heading in the module. Do not add extra `<link>` tags or extra `<script>` includes inside modules; the assembled course should rely on the shipped local runtime files `styles.css` and `main.js`. The course output is a multi-file directory with `modules/`, `briefs/`, `_base.html`, `_footer.html`, `styles.css`, `main.js`, and a built `index.html`. Keep assets local and clean-room so the result is directly openable in a browser and readable offline. Use short real excerpts only when they are necessary for teaching, never dump whole files, never claim built-in redaction guarantees, and keep examples public-safe. Prefer shipped runtime widgets when they are available in the installed bundle, and otherwise fall back to static or minimal local HTML/CSS/JS patterns that stay offline-readable without introducing extra asset includes. Interaction patterns may include translation blocks, quizzes, drag/drop, group chat, data flow, architecture diagrams, layer toggles, bug challenges, scenario quizzes, callouts, pattern cards, flow diagrams, permission/config badges, glossary tooltips, visual file trees, icon-label rows, and numbered step cards when they improve understanding. After content changes, run `bash .codex/skills/codebase-to-course/scripts/build-course.sh --course-dir <course-dir>` and report the output path without promising automatic browser launch.
