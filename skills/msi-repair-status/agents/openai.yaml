interface:
  display_name: "MSI Repair Status"
  short_description: "Query, interpret, compare, surface shipment numbers, and optionally enrich MSI China repairs"
  default_prompt: "Use $msi-repair-status to query MSI China repair progress for an RMA and serial number, interpret the current status, compare it with the last successful result, and include the exact reminder wording when user action is implied. If a captcha answer is needed, it may come from manual reading, direct agent judgment for a clearly legible simple arithmetic expression, or auxiliary recognition. For captchas that are not clearly legible simple arithmetic expressions, the final answer must be confirmed or overridden by the user before submission. If the arithmetic captcha is obvious and the agent has high confidence, it may compute and submit the answer directly. If the shell script is run with --answer, treat that explicit CLI value as already confirmed by the caller. When MSI returns a shipment number, surface it plainly. Only if the local $express-tracking skill is installed, configured, and the lookup succeeds should you continue with a courier lookup and report a short live logistics summary. If courier lookup is unavailable or misconfigured, report the shipment number plainly without guessing logistics progress. Stop and explain the blocker if the site adds extra verification, blocks access, or the site structure changes enough that parsing assumptions no longer hold, including when a successful HTML result no longer yields the expected workflow stage."
